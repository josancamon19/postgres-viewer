name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  macos:
    name: Build macOS app
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Install frontend dependencies
        run: npm ci

      - name: Build universal macOS app
        run: npm run tauri -- build --target universal-apple-darwin --bundles app

      - name: Package app bundle
        run: |
          mkdir -p release
          ditto -c -k --keepParent \
            "src-tauri/target/universal-apple-darwin/release/bundle/macos/Postgres Viewer.app" \
            "release/Postgres-Viewer-macOS-universal.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Postgres-Viewer-macOS-universal
          path: release/Postgres-Viewer-macOS-universal.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/Postgres-Viewer-macOS-universal.zip
          generate_release_notes: true
